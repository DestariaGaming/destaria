name: Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Fetch PR title
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr view "$PR_NUMBER" --json title --jq .title > "$RUNNER_TEMP/pr-title.txt"

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        run: |
          PR_TITLE="$(cat "$RUNNER_TEMP/pr-title.txt")"
          if [[ "$PR_TITLE" == *$'\n'* || "$PR_TITLE" == *$'\r'* ]]; then
            echo "Invalid PR title."
            echo "Title must be a single line."
            exit 1
          fi

          if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\((cli|docs|repo|sdk|launcher|runtime|core)\))?(!)?:\ [^[:space:]].*$ ]]; then
            echo "Invalid PR title."
            echo "Title must match type(scope): subject or type: subject."
            echo "Allowed types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo "Allowed scopes: cli, docs, repo, sdk, launcher, runtime, core"
            exit 1
          fi

          echo "PR title is valid."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check:all

      - name: Run builds
        run: bun run build:all

      - name: Run tests
        run: bun run test:all
